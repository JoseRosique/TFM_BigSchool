<!-- Global Toast Notifications -->
<app-toast-container></app-toast-container>

@if (guardLoading()) {
  <div class="route-guard-loading" role="status" aria-live="polite">
    <span class="visually-hidden">{{ "GLOBAL.LOADING_CONTENT" | translate }}</span>
  </div>
}

@if (shouldShowHeader()) {
  <div class="app-shell">
    <app-header></app-header>
    <div class="app-shell__body">
      <app-sidebar></app-sidebar>
      <main class="app-shell__content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
} @else {
  <router-outlet></router-outlet>
}
