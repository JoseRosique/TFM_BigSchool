@for (slot of slots(); track slot.id) {
  <article
    class="month-slot"
    [class.month-slot--clickable]="isOwner(slot) || isReadOnly()"
    [class.month-slot--available]="slot.status === slotStatus().AVAILABLE"
    [class.month-slot--reserved]="slot.status === slotStatus().RESERVED"
    [class.month-slot--canceled]="slot.status === slotStatus().CANCELED"
    (click)="onSlotClick(slot, $event)"
  >
    <span class="month-slot__time">
      {{ formatSlotRange(slot) }}
    </span>
    @if (isReadOnly()) {
      <button
        class="month-slot__action month-slot__action--view"
        type="button"
        title="{{ 'CALENDAR_PAGE.VIEW' | translate }}"
        (click)="onEdit(slot, $event)"
      >
        <span class="material-symbols-outlined">visibility</span>
      </button>
    } @else {
      @if (isOwner(slot)) {
        <button
          class="month-slot__action"
          [class.month-slot__action--edit]="slot.status !== slotStatus().RESERVED"
          [class.month-slot__action--view]="slot.status === slotStatus().RESERVED"
          type="button"
          [title]="
            slot.status === slotStatus().RESERVED
              ? ('CALENDAR_PAGE.VIEW' | translate)
              : ('CALENDAR_PAGE.EDIT_SLOT_SHORT' | translate)
          "
          (click)="onEdit(slot, $event)"
        >
          <span class="material-symbols-outlined">{{
            slot.status === slotStatus().RESERVED ? "visibility" : "edit"
          }}</span>
        </button>
      } @else {
        @if (slot.status === slotStatus().AVAILABLE) {
          <button
            class="month-slot__action month-slot__action--primary"
            type="button"
            (click)="onReserve(slot, $event)"
            [disabled]="processingSlotId() === slot.id"
          >
            {{ "CALENDAR_PAGE.RESERVE_SHORT" | translate }}
          </button>
        } @else {
          <span class="month-slot__tag">{{ "CALENDAR_PAGE.UNAVAILABLE" | translate }}</span>
        }
      }
    }
  </article>
}
@if (moreCount() > 0) {
  <button class="month-slot__more" type="button" (click)="onShowMore($event)">
    {{ "CALENDAR_PAGE.MORE" | translate: { count: moreCount() } }}
  </button>
}
