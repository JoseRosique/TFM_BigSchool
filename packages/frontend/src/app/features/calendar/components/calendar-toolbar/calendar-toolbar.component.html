<div class="calendar-toolbar">
  <div class="calendar-tabs" role="tablist">
    <button
      class="tab"
      type="button"
      role="tab"
      [attr.aria-selected]="viewMode() === 'mine'"
      [class.tab--active]="viewMode() === 'mine'"
      (click)="setViewMode('mine')"
    >
      {{ "CALENDAR_PAGE.MY_AVAILABILITY" | translate }}
    </button>
    <button
      class="tab"
      type="button"
      role="tab"
      [attr.aria-selected]="viewMode() === 'explore'"
      [class.tab--active]="viewMode() === 'explore'"
      (click)="setViewMode('explore')"
    >
      {{ "CALENDAR_PAGE.EXPLORE" | translate }}
    </button>
  </div>
  <div class="calendar-toolbar__month">
    <span class="calendar-month__label">{{ monthLabel() }}</span>
  </div>
  <div class="calendar-nav">
    <button
      class="btn btn--ghost"
      type="button"
      (click)="goPrev()"
      [attr.aria-label]="'CALENDAR_PAGE.PREV_MONTH' | translate"
    >
      <span class="material-symbols-outlined">chevron_left</span>
      <span class="btn-text">{{ "CALENDAR_PAGE.PREV_MONTH" | translate }}</span>
    </button>
    <button
      class="btn btn--ghost"
      type="button"
      (click)="goToday()"
      [attr.aria-label]="'CALENDAR_PAGE.TODAY' | translate"
    >
      <span class="material-symbols-outlined">today</span>
      <span class="btn-text">{{ "CALENDAR_PAGE.TODAY" | translate }}</span>
    </button>
    <button
      class="btn btn--ghost"
      type="button"
      (click)="goNext()"
      [attr.aria-label]="'CALENDAR_PAGE.NEXT_MONTH' | translate"
    >
      <span class="btn-text">{{ "CALENDAR_PAGE.NEXT_MONTH" | translate }}</span>
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
</div>
