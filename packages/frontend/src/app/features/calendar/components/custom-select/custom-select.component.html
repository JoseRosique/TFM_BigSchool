<div
  class="custom-select"
  [class.custom-select--open]="isOpen()"
  [class.custom-select--disabled]="disabled()"
  role="combobox"
  [attr.aria-expanded]="isOpen()"
  [attr.aria-haspopup]="'listbox'"
  [attr.aria-label]="ariaLabel() || placeholder()"
>
  <button
    type="button"
    class="custom-select__trigger"
    (click)="toggle()"
    (keydown)="onKeyDown($event)"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel() || getSelectedLabel()"
  >
    <span class="custom-select__value">{{ getSelectedLabel() }}</span>
    <span class="custom-select__arrow material-symbols-outlined">
      {{ isOpen() ? "expand_less" : "expand_more" }}
    </span>
  </button>

  @if (isOpen() && !disabled()) {
    <div class="custom-select__panel" role="listbox">
      @for (option of options(); track option.value; let idx = $index) {
        @if (idx === 0 || option.group !== options()[idx - 1]?.group) {
          @if (option.group) {
            <div class="custom-select__group-label">{{ option.group }}</div>
          }
        }
        <button
          type="button"
          class="custom-select__option"
          [class.custom-select__option--selected]="isOptionSelected(option)"
          [class.custom-select__option--focused]="isOptionFocused(idx)"
          (click)="selectOption(option)"
          (mouseenter)="onOptionMouseEnter(idx)"
          role="option"
          [attr.aria-selected]="isOptionSelected(option)"
        >
          <span class="custom-select__option-label">{{ option.label }}</span>
          @if (isOptionSelected(option)) {
            <span class="custom-select__option-check material-symbols-outlined">check</span>
          }
        </button>
      }
    </div>
  }
</div>
