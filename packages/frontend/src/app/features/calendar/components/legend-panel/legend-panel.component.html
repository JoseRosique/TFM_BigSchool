<section class="calendar-panel calendar-panel--legend">
  <header class="calendar-panel__header">
    <div>
      <p class="panel-kicker">{{ "CALENDAR_PAGE.LEGEND_KICKER" | translate }}</p>
      <h2 class="panel-title">{{ "CALENDAR_PAGE.LEGEND_TITLE" | translate }}</h2>
    </div>
  </header>
  <div class="legend">
    <div class="legend-item">
      <span class="legend-dot legend-dot--available"></span>
      <span>{{ "CALENDAR_PAGE.STATUS.AVAILABLE" | translate }}</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot legend-dot--reserved"></span>
      <span>{{ "CALENDAR_PAGE.STATUS.RESERVED" | translate }}</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot legend-dot--canceled"></span>
      <span>{{ "CALENDAR_PAGE.STATUS.CANCELED" | translate }}</span>
    </div>
  </div>
</section>
