<header class="header">
  <div class="header-container">
    <!-- Logo and App Name -->
    <div class="header-left">
      <button class="logo-container" (click)="goToDashboard()" [attr.aria-label]="'HEADER.GO_TO_DASHBOARD' | translate">
        <span class="material-symbols-outlined logo" aria-hidden="true">diversity_3</span>
        <span class="app-name">{{ "GLOBAL.APP_NAME" | translate }}</span>
      </button>
    </div>

    <!-- Welcome Message -->
    <div class="header-center">
      <span class="welcome-message">
        {{ "HEADER.WELCOME" | translate: { name: userName() } }}
      </span>
    </div>

    <!-- Notifications and Profile -->
    <div class="header-right">
      <!-- Notifications Icon -->
      <button
        class="icon-button"
        (click)="onNotificationsClick()"
        [attr.aria-label]="'HEADER.NOTIFICATIONS' | translate"
      >
        <svg class="notification-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.37 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.64 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16Z"
            fill="currentColor"
          />
        </svg>
      </button>

      <!-- Language Switcher -->
      <div class="lang-switcher">
        <button
          class="lang-main-btn"
          (click)="toggleLangMenu()"
          (keydown.escape)="closeLangMenu()"
          [attr.aria-expanded]="showLangMenu"
          aria-haspopup="menu"
        >
          @if (currentLang === "en") {
            <img
              src="https://flagcdn.com/gb.svg"
              [attr.alt]="'HEADER.LANG_EN_ALT' | translate"
              class="lang-flag"
              width="20"
              height="14"
            />
          }
          @if (currentLang === "es") {
            <img
              src="https://flagcdn.com/es.svg"
              [attr.alt]="'HEADER.LANG_ES_ALT' | translate"
              class="lang-flag"
              width="20"
              height="14"
            />
          }
          <span class="lang-main-label">{{ currentLang | uppercase }}</span>
          <span class="material-symbols-outlined lang-arrow">expand_more</span>
        </button>
        @if (showLangMenu) {
          <div class="lang-menu" (mouseleave)="closeLangMenu()" (keydown.escape)="closeLangMenu()" role="menu">
            <button
              class="lang-menu-item"
              role="menuitem"
              [class.active]="currentLang === 'en'"
              (click)="setLang('en'); closeLangMenu()"
            >
              <span class="lang-radio">
                @if (currentLang === "en") {
                  <span class="lang-dot"></span>
                }
              </span>
              <img
                src="https://flagcdn.com/gb.svg"
                [attr.alt]="'HEADER.LANG_EN_ALT' | translate"
                class="lang-flag"
                width="20"
                height="14"
              />
              <span class="lang-label">{{ "HEADER.LANG_EN_LABEL" | translate }}</span>
            </button>
            <button
              class="lang-menu-item"
              role="menuitem"
              [class.active]="currentLang === 'es'"
              (click)="setLang('es'); closeLangMenu()"
            >
              <span class="lang-radio">
                @if (currentLang === "es") {
                  <span class="lang-dot"></span>
                }
              </span>
              <img
                src="https://flagcdn.com/es.svg"
                [attr.alt]="'HEADER.LANG_ES_ALT' | translate"
                class="lang-flag"
                width="20"
                height="14"
              />
              <span class="lang-label">{{ "HEADER.LANG_ES_LABEL" | translate }}</span>
            </button>
          </div>
        }
      </div>

      <!-- Profile Dropdown -->
      <div class="profile-container" #profileContainer>
        <button
          class="profile-button"
          (click)="toggleDropdown()"
          [attr.aria-label]="'HEADER.USER_PROFILE' | translate"
          [attr.aria-expanded]="isDropdownOpen()"
        >
          <div class="profile-avatar">
            <img [src]="userAvatar()" [alt]="userName()" />
          </div>
          <svg
            class="dropdown-arrow"
            [class.open]="isDropdownOpen()"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M7 10L12 15L17 10H7Z" fill="currentColor" />
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu" [class.show]="isDropdownOpen()">
          <button class="dropdown-item" [routerLink]="'/profile'" (click)="closeDropdown()">
            <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 5C13.66 5 15 6.34 15 8C15 9.66 13.66 11 12 11C10.34 11 9 9.66 9 8C9 6.34 10.34 5 12 5ZM12 19.2C9.5 19.2 7.29 17.92 6 15.98C6.03 13.99 10 12.9 12 12.9C13.99 12.9 17.97 13.99 18 15.98C16.71 17.92 14.5 19.2 12 19.2Z"
                fill="currentColor"
              />
            </svg>
            {{ "HEADER.MY_PROFILE" | translate }}
          </button>
          <button class="dropdown-item" (click)="logout()">
            <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.59L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z"
                fill="currentColor"
              />
            </svg>
            {{ "HEADER.LOGOUT" | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
